name: Hedge fund daily run

on:
  schedule:
    # Every day at 13:30 UTC — US market open 9:30 ET during daylight
    # time (8:30 ET in winter, still pre-open). Weekdays: full run with
    # equity ledger + equity deep dives. Weekends: crypto desk update +
    # crypto agents only (crypto has no weekend; the equity ledger
    # recognizes the unchanged bar and skips).
    # Signals use the last COMPLETE daily bar; fetch_data drops any
    # in-progress bar for today.
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      force_rebalance:
        description: "Force a rebalance regardless of weekday"
        type: boolean
        default: false
      deep_dive:
        description: "Run LLM deep dives on top names (needs ANTHROPIC_API_KEY secret)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install ./trading

      - name: Refresh price data
        working-directory: trading
        run: python -m hedgefund.fetch_data

      - name: Run daily job (screen + paper ledger + morning report)
        working-directory: trading
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADINGAGENTS_LLM_PROVIDER: anthropic
          TRADINGAGENTS_DEEP_THINK_LLM: claude-sonnet-4-6
          TRADINGAGENTS_QUICK_THINK_LLM: claude-haiku-4-5
        run: |
          FLAGS=""
          if [ "${{ inputs.force_rebalance }}" = "true" ]; then FLAGS="--force-rebalance"; fi
          if [ "${{ inputs.deep_dive }}" != "false" ] && [ -n "$ANTHROPIC_API_KEY" ]; then FLAGS="$FLAGS --deep-dive"; fi
          python -m hedgefund.run daily $FLAGS

      - name: Commit ledger + report
        run: |
          git config user.name "hedgefund-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f trading/hedgefund/state trading/hedgefund/reports
          git diff --cached --quiet || git commit -m "Daily run: ledger + morning report [skip ci]"
          git push

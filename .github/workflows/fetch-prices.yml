name: fetch-prices
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch price data
        run: python3 .github/scripts/fetch_prices.py
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trading/hedgefund/data
          git commit -m "Add price CSVs" || echo "no changes"
          git push

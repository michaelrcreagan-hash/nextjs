# CBT Framework Configuration
# Strategy: macro_sector_dominance
# Generated by CBT Framework

account:
  initial_capital: 10000
  currency: USD

# Computing engine
engine:
  type: pandas  # pandas | fast (Polars + NumPy + Numba)

sizing:
  mode: percent  # percent | fixed | kelly
  percent_per_trade: 2.0
  fixed_amount: null
  max_positions: 3

leverage:
  enabled: true
  default: 5
  max: 20

risk:
  stop_loss:
    enabled: true
    mode: percent  # percent | atr | fixed
    percent: 1.0
    atr_multiplier: null
    fixed_value: null
  take_profit:
    enabled: true
    mode: percent  # percent | rr_ratio | fixed
    percent: 2.0
    rr_ratio: null
    fixed_value: null
  trailing_stop:
    enabled: false
    activation: 1.0  # % profit to activate
    distance: 0.5    # % distance from high

fees:
  maker: 0.02  # percentage
  taker: 0.04  # percentage
  slippage: 0.01  # percentage

execution:
  entry_type: market  # market | limit
  exit_type: market   # market | limit
  partial_exits: false

time:
  start_date: null  # YYYY-MM-DD or null for full history
  end_date: null    # YYYY-MM-DD or null for latest
  trading_hours: null  # e.g., "09:30-16:00" or null for 24/7

# Prop Firm Challenge Rules (set during /cbt:discover)
prop_firm:
  enabled: false
  phase: 1                        # 1 | 2
  max_drawdown_percent: 10.0      # Fixed from initial capital
  daily_loss_percent: 5.0         # From previous day equity
  phase1_target_percent: 10.0
  phase2_target_percent: 5.0
  breach_action: halt             # halt trading on breach

# Strategy-specific parameters (populated by /cbt:build)
strategy_params:
  regime_factors:
    vix: { bull: 18, bear: 25 }
    smh_200d: { above: 2, below: -2 }
    net_liquidity: { expanding: 2, contracting: 0 }
    ism: { above_50: 1 }
    dxy: { below_105: 1 }
  sector_ranking_lookbacks_months: [3, 6, 12]
  top_sectors: 3
  rotation_frequency: monthly
  sector_universe: [XLK, XLE, XLI, XLV, XLF, XLP, XLY, XLU, XLB, XLC, XLRE]  # 11 SPDR sectors -- resolved, see DISCOVERY.md
  sector_rank_combination: equal_weighted_avg_percentile  # assumed default, not explicitly specified in source docs -- confirm with user

  # Regime score (0-12 scale), resolved from TECE v5.2 + IMRAS Fusion -- see DISCOVERY.md
  regime_score_model:
    components:
      vix: { "<18": 3, "18-25": 1, ">25": 0 }
      smh: { ">50dma": 3, ">200dma": 2, "<200dma": -2 }
      net_liquidity: { expanding: 2, flat: 1, contracting: 0 }
      ism_new_orders: { ">=50": 1, "<50": 0 }
      dxy: { "<105_stable": 1, ">=105_or_rising_fast": 0 }
    regime_labels:
      RISK_ON: { score_range: [8, 12], gross_exposure_pct: 80, max_margin: 2.0, thematic_cap_pct: 60 }
      MIXED: { score_range: [5, 7], gross_exposure_pct: 50, max_margin: 1.5, thematic_cap_pct: 45 }
      CAUTION: { score_range: [2, 4], gross_exposure_pct: 25, max_margin: 1.0, thematic_cap_pct: 30 }
      RISK_OFF: { score_range: [0, 1], gross_exposure_pct: 0, max_margin: 0.5, thematic_cap_pct: 0 }
    hard_kill_switches:
      - "VIX > 30 -> RISK-OFF for 48h minimum"
      - "SMH < 200-DMA -> no new positions regardless of other signals"
      - "10Y > 5% AND ISM < 48 -> defensive only / flat except hedges"
      - "FCI tightening + VIX > 25 -> RISK-OFF"

  # Net liquidity proxy: Fed Balance Sheet - TGA - RRP (public FRED-computable substitute
  # for the docs' categorical Howell-inspired "expanding/flat/contracting" judgment)
  net_liquidity_formula: fed_balance_sheet_minus_tga_minus_rrp

# Notification channels (populated by /cbt:live)
notifications:
  discord:
    enabled: false
    webhook_url: null  # Set in .env as DISCORD_WEBHOOK_URL
  telegram:
    enabled: false
    bot_token: null    # Set in .env as TELEGRAM_BOT_TOKEN
    chat_id: null      # Set in .env as TELEGRAM_CHAT_ID
  sms:
    enabled: false
    provider: twilio   # twilio
    # Credentials set in .env: TWILIO_SID, TWILIO_TOKEN, TWILIO_FROM, TWILIO_TO
  email:
    enabled: false
    smtp_host: null
    smtp_port: 587
    # Credentials set in .env: EMAIL_USER, EMAIL_PASS, EMAIL_TO

# Live trading configuration (populated by /cbt:live)
live:
  exchange: null       # bybit | kraken | binance | hyperliquid
  mode: paper          # paper | live
  api_key: null        # Set in .env as EXCHANGE_API_KEY
  api_secret: null     # Set in .env as EXCHANGE_API_SECRET
  subaccount: null     # Optional subaccount name
  max_position_size: null  # Maximum position size limit
  kill_switch: true    # Emergency stop on large drawdown
  kill_switch_drawdown: 10.0  # % drawdown to trigger kill switch

# CBT Framework Configuration
# Strategy: btc_prop_strategy_v2
# Generated by CBT Framework, synthesized from 7 source documents

account:
  initial_capital: 50000
  currency: USD

# Computing engine
engine:
  type: pandas  # pandas | fast (Polars + NumPy + Numba)

sizing:
  mode: percent  # percent | fixed | kelly
  percent_per_trade: 0.5  # MAX_RISK_PER_TRADE_PCT -- prop-firm-safe, overrides aggressive-account 2% figure in source backtest doc (see DISCOVERY.md merge notes)
  fixed_amount: null
  max_positions: 3  # trend_rider + range_hunter + funding_farmer concurrently
  position_max_percent: 10.0

leverage:
  enabled: true
  default: 2
  max: 3  # hard prop-firm ceiling -- confluence tiers change sizing within this cap, never raise it (source docs allowed up to 5-8x; overridden)

risk:
  stop_loss:
    enabled: true
    mode: atr  # percent | atr | fixed
    percent: null
    atr_multiplier: 2.0  # Trend Rider default; Range Hunter/DCB overrides in strategy_params
    fixed_value: null
  take_profit:
    enabled: true
    mode: rr_ratio  # percent | rr_ratio | fixed
    percent: null
    rr_ratio: 2.5
    fixed_value: null
  trailing_stop:
    enabled: true
    activation: 1.0  # % profit to activate (Trend Rider)
    distance: 0.5    # % distance from high

fees:
  maker: 0.02  # percentage
  taker: 0.04  # percentage (matches Binance taker fee used in source backtest)
  slippage: 0.02  # percentage

execution:
  entry_type: market  # market | limit
  exit_type: market   # market | limit
  partial_exits: true  # 50/30/20 scale-out across T1/T2/T3

time:
  start_date: null  # YYYY-MM-DD or null for full history
  end_date: null    # YYYY-MM-DD or null for latest
  trading_hours: null  # gated by timing_filters in strategy_params, not a fixed window

# Prop Firm Challenge Rules (firm-level limits; internal safety buffer below in strategy_params.risk_manager)
prop_firm:
  enabled: true
  phase: 1                        # 1 | 2
  max_drawdown_percent: 10.0      # firm limit, fixed from initial capital
  daily_loss_percent: 5.0         # firm limit, from previous day equity
  phase1_target_percent: 10.0
  phase2_target_percent: 5.0
  breach_action: halt             # halt trading on breach

# Strategy-specific parameters (populated by /cbt:build)
strategy_params:

  # Internal prop-firm safety buffer (60% of firm limits, README/config.py source)
  risk_manager:
    max_daily_loss_percent: 3.0
    max_total_drawdown_percent: 6.0
    max_risk_per_trade_percent: 0.5
    daily_profit_target_percent: 0.5
    consistency_max_day_percent: 25.0
    max_trades_per_day: 5
    min_trade_interval_minutes: 60
    auto_deleverage_after_consecutive_stops: 2

  # Sub-strategy allocations (must sum to 1.0)
  allocations:
    trend_rider: 0.50
    range_hunter: 0.30
    funding_farmer: 0.20

  trend_rider:
    timeframe_entry: "4H"
    timeframe_trend: "1D"
    ema_fast: 9
    ema_slow: 21
    supertrend_period: 10
    supertrend_multiplier: 3.0
    adx_period: 14
    adx_threshold: 25.0
    atr_period: 14
    rr_min: 2.0
    rr_optimal: 3.0
    trailing_atr_multiple: 2.0

  range_hunter:
    timeframe: "1H"
    rsi_period: 2
    rsi_oversold: 10
    rsi_overbought: 90
    rsi_mean: 50
    bb_period: 20
    bb_stddev: 2.0
    adx_period: 14
    adx_max: 20.0
    atr_period: 14
    atr_stop_multiple: 1.0
    rr_min: 1.5
    # confirmation layer folded in from stale Dec-2024 doc (generic pattern only, see DISCOVERY.md merge notes)
    confirmation:
      volume_spike_multiple: 1.5  # vs 50-period average
      stoch_rsi_reversal_from: 20  # cross up from <20 (longs) / down from >80 (shorts)
      validation_closes_required: 3  # 3 green (or red) daily closes post-trigger

  funding_farmer:
    timeframe: "4H"
    funding_threshold_pct: 0.02   # 8h rate; raised from 0.01 per RESEARCH.md -- academic funding-arbitrage study finds spreads only economically significant above ~20bps annualized-equivalent
    funding_optimal_zone_min: -0.01  # optimal short zone, from Coinglass backtest
    funding_optimal_zone_max: 0.03
    cvd_lookback: 20
    hold_max_hours: 48
    hold_min_hours: 24
    rr_min: 1.0
    expected_win_rate_pct: 50  # downgraded from source docs' 70-90% per RESEARCH.md -- academic data shows only ~40% of top funding-arb opportunities profitable after costs; using 50% as a conservative working target pending /cbt:eda validation

  # DCB-short overlay -- conditional sub-strategy, active only in confirmed bear regime (price < 365DMA)
  dcb_overlay:
    enabled: true
    bear_regime_condition: "price_below_365dma"
    trigger_min_signals_of_5: 4
    distance_to_declining_200dma_pct: 5.0
    min_bounce_age_days: 10
    min_bounce_gain_pct: 15.0
    stop_atr_multiple: 1.5
    target_fib_retracement: 0.382
    three_month_rule_override: true  # 3 consecutive green monthly closes suspends DCB-short setups
    max_leverage: 3  # capped at prop-firm ceiling, not the 5x in source research doc
    top5_signals:
      - declining_200dma_rejection      # ~82% historical accuracy
      - sopr_reclaim_and_fail_at_1      # ~80%
      - volume_decay_on_green_candles   # ~78%
      - funding_flip_negative_to_positive  # ~75%
      - lth_supply_still_declining      # ~72%

  # Macro/cycle/on-chain/derivatives/technical/DCB confluence scorer
  confluence_scorer:
    macro_is_gate_not_score: true  # explicit correction adopted from source doc, see DISCOVERY.md merge notes
    min_confluence_layers_of_6: 4  # below this -> NO TRADE
    layer_weights:
      macro: 0.20        # gating
      cycle: 0.10
      onchain: 0.25       # drops to 0.15 in confirmed bear
      derivatives: 0.20
      technical: 0.15
      dcb: 0.10           # rises to 0.25 in confirmed bear
    leverage_tiers:
      "4_of_6": 2.0
      "5_of_6": 2.5
      "6_of_6": 3.0  # capped at prop-firm 3x ceiling regardless of source doc's 5-8x table
    thresholds:
      mvrv_z_long: 0.0
      mvrv_z_short: 5.5   # revised down from 7.0, diminishing-peaks pattern in source doc
      puell_long: 0.5
      puell_short: 3.0    # revised down from 4.0, post-halving epoch
      dxy_bullish_below: 99.0
      dxy_bearish_above: 101.0
      funding_extreme_7d_ma: 0.01  # 8h rate

  # Coinglass confluence booster (free-tier filters)
  coinglass_filters:
    oi_direction_required: "rising_or_flat"  # never short when OI falling (liquidation cascade in progress)
    cvd_divergence_types: [bearish_divergence, distribution_pattern, false_breakout]
    liquidation_proximity_pct: 3.0
    net_delta_contrarian_threshold_pct: 55.0  # long% > 55 favors shorts (crowd is exit liquidity)
    large_order_wall_min_usd: 1000000
    etf_flow_pause_inflow_threshold_usd: 300000000   # >$300M inflow 1 day -> pause new shorts
    etf_flow_favor_outflow_threshold_usd: 200000000  # >$200M outflow 2+ consecutive days -> high short conviction

  # Calendar/session timing filters
  timing_filters:
    fomc:
      no_new_positions_days_before: 3
      aggressive_entry_window_hours_after: [24, 48]
    cpi:
      surprise_favors_shorts_above_pct: 0.2
      pause_shorts_days_if_surprise_below_pct: -0.2
      pause_days: 3
    session_best_windows_utc:
      - { start: "16:00", end: "18:00", days: [Mon, Tue, Wed], label: "USA open" }
      - { start: "00:00", end: "02:00", days: [Tue, Wed, Thu], label: "early Asia" }
    session_avoid_windows_utc:
      - { start: "10:00", end: "14:00", days: [any], label: "Europe mid-session, high reversal rate" }
      - { start: "16:00", end: "00:00", days: [Fri], label: "weekend squeeze risk" }

  # Expected performance envelope (source backtests, 2018-2026, 452 trades baseline)
  expected_performance:
    win_rate_baseline_pct: 71.2
    win_rate_enhanced_pct: 82.7  # with full Coinglass + timing filter stack
    avg_rr_baseline: 2.85
    avg_rr_enhanced: 3.64
    sharpe_baseline: 1.84
    sharpe_enhanced: 2.68
    max_drawdown_pct: 19.3  # backtest context, not the live prop account's 6% internal buffer
    note: "Figures are source-document backtest claims, several self-flagged as practitioner estimates rather than rigorous stats. /cbt:research (RESEARCH.md) found academic support for Trend Rider's category (Sharpe ~1.5-1.6, SFI 2025 paper) but found Funding Farmer's 70-90% win-rate claim contradicted by academic data (~40% after costs); DCB-overlay and on-chain thresholds remain unvalidated practitioner estimates. Treat as build targets to validate in /cbt:eda, not established fact."

  optimize_ranges:
    adx_threshold: [20, 25, 30]
    rsi2_oversold: [5, 10, 15]
    funding_threshold_pct: [0.005, 0.01, 0.02]
    mvrv_z_short: [5.0, 5.5, 6.0]
    max_leverage: [1, 2, 3]
    min_confluence_layers_of_6: [3, 4, 5]

# Notification channels (populated by /cbt:live)
notifications:
  discord:
    enabled: false
    webhook_url: null  # Set in .env as DISCORD_WEBHOOK_URL
  telegram:
    enabled: false
    bot_token: null    # Set in .env as TELEGRAM_BOT_TOKEN
    chat_id: null      # Set in .env as TELEGRAM_CHAT_ID
  sms:
    enabled: false
    provider: twilio   # twilio
    # Credentials set in .env: TWILIO_SID, TWILIO_TOKEN, TWILIO_FROM, TWILIO_TO
  email:
    enabled: false
    smtp_host: null
    smtp_port: 587
    # Credentials set in .env: EMAIL_USER, EMAIL_PASS, EMAIL_TO

# Live trading configuration (populated by /cbt:live)
live:
  exchange: null       # bybit | kraken | binance | hyperliquid
  mode: paper          # paper | live
  api_key: null        # Set in .env as EXCHANGE_API_KEY
  api_secret: null     # Set in .env as EXCHANGE_API_SECRET
  subaccount: null     # Optional subaccount name
  max_position_size: null  # Maximum position size limit
  kill_switch: true    # Emergency stop on large drawdown
  kill_switch_drawdown: 6.0  # matches internal total-DD safety buffer, not firm's 10% max

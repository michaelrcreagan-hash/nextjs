# CBT Framework State
# Strategy: {strategy_name}
# DO NOT EDIT MANUALLY - managed by CBT Framework

strategy: {strategy_name}
created: {date}
last_updated: {date}

# Workflow mode: interactive (confirm each step) | yolo (auto-approve)
mode: interactive

# Computing engine: pandas (standard) | fast (Polars + NumPy + Numba)
engine: pandas

# Project type: indicator | ml | hybrid
project_type: null

# Current phase in workflow
phase: discovery  # discovery | research | eda | config | plan | build | iterate

# Phase completion tracking
phases_completed:
  discovery: false
  research: false
  eda: false
  config: false
  plan: false
  build: false

# Build process tracking
build:
  plan: []
  current_step: null
  progress: "0/0"

# Experiment tracking
experiments:
  count: 0
  current: null
  best: null
  baseline_sharpe: null

# Pending observations to test
pending_observations: []

# Iteration history
iterations: []

# Report file path (relative to strategy dir)
report_file: null

# Live deployment status
live:
  deployed: false
  exchange: null
  mode: null  # paper | live

# Prop firm challenge tracking
prop_firm:
  enabled: false
  account_type: personal          # personal | prop_firm
